name: PR CI

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

env:
  XCODE_DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode 26.3
        run: |
          set -euo pipefail

          if [[ ! -d "${XCODE_DEVELOPER_DIR}" ]]; then
            echo "Expected Xcode not found at ${XCODE_DEVELOPER_DIR}" >&2
            exit 1
          fi

          export DEVELOPER_DIR="${XCODE_DEVELOPER_DIR}"
          echo "DEVELOPER_DIR=${DEVELOPER_DIR}" >> "${GITHUB_ENV}"
          echo "Selected Xcode: ${DEVELOPER_DIR}"
          xcodebuild -version
          xcrun swift --version

      - name: Cache SwiftPM artifacts
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-${{ runner.arch }}-xcode-26.3-spm-v1-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-xcode-26.3-spm-
            ${{ runner.os }}-${{ runner.arch }}-spm-

      - name: Build
        run: |
          set -euo pipefail
          swift build

      - name: Test
        run: |
          set -euo pipefail
          swift test

  release-smoke:
    name: Release Smoke
    needs: build-and-test
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode 26.3
        run: |
          set -euo pipefail

          if [[ ! -d "${XCODE_DEVELOPER_DIR}" ]]; then
            echo "Expected Xcode not found at ${XCODE_DEVELOPER_DIR}" >&2
            exit 1
          fi

          export DEVELOPER_DIR="${XCODE_DEVELOPER_DIR}"
          echo "DEVELOPER_DIR=${DEVELOPER_DIR}" >> "${GITHUB_ENV}"
          echo "Selected Xcode: ${DEVELOPER_DIR}"
          xcodebuild -version
          xcrun swift --version

      - name: Cache SwiftPM artifacts
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-${{ runner.arch }}-xcode-26.3-spm-v1-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-xcode-26.3-spm-
            ${{ runner.os }}-${{ runner.arch }}-spm-

      - name: Release build smoke check
        run: |
          set -euo pipefail
          swift build -c release
